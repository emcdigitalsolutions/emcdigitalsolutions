<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c1120"/>
      <stop offset="50%" stop-color="#131b2e"/>
      <stop offset="100%" stop-color="#0f1728"/>
    </linearGradient>
    <linearGradient id="barG" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6b9ef7"/>
      <stop offset="100%" stop-color="#f5c542"/>
    </linearGradient>
    <linearGradient id="txtG" x1="0" y1="0" x2="400" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6b9ef7"/>
      <stop offset="50%" stop-color="#93b8fc"/>
      <stop offset="100%" stop-color="#f5c542"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Border accent -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#txtG)" opacity="0.6"/>
  <!-- Logo E chevrons -->
  <g transform="translate(420, 160) scale(3)">
    <path d="M4,4 H24 L32,8 L24,12 H4 A4,4 0 0,1 4,4Z" fill="url(#barG)"/>
    <path d="M4,15 H20 L28,19 L20,23 H4 A4,4 0 0,1 4,15Z" fill="url(#barG)" opacity="0.85"/>
    <path d="M4,26 H24 L32,30 L24,34 H4 A4,4 0 0,1 4,26Z" fill="url(#barG)"/>
  </g>
  <!-- EMC text -->
  <text x="530" y="290" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="60" font-weight="700" fill="url(#txtG)" letter-spacing="8">EMC</text>
  <!-- Digital Solutions text -->
  <text x="600" y="370" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="28" font-weight="400" fill="#9ca3b0" text-anchor="middle" letter-spacing="4">DIGITAL SOLUTIONS</text>
  <!-- Tagline -->
  <text x="600" y="440" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="20" font-weight="300" fill="#e8e4dc" text-anchor="middle" opacity="0.7">Sviluppo Software &amp; Soluzioni Digitali su Misura</text>
  <!-- Location -->
  <text x="600" y="480" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="16" font-weight="300" fill="#f5c542" text-anchor="middle" opacity="0.5">Sicilia, Italia</text>
</svg>
